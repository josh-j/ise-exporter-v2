name: Debian and Ubuntu native install

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native-systemd-install:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validate installer syntax
        run: bash -n deploy/install.sh

      - name: Install using the native systemd path
        run: sudo ./deploy/install.sh "$PWD"

      - name: Verify package, commands, and systemd installation
        run: |
          sudo /opt/ise-exporter/.venv/bin/python -c \
            'import ise_exporter, oracledb, requests; print(oracledb.__version__)'
          ise-cli --help
          pwsh -NoProfile -Command \
            'Import-Module Ise.Cli; Get-Command Find-IseEndpoint; Get-IseCliVersion'
          /opt/ise-exporter/.venv/bin/ise-exporter --help
          test -L /usr/local/bin/ise-cli
          sudo systemd-analyze verify /etc/systemd/system/ise-exporter.service

      - name: Verify safe fresh-install lifecycle
        run: |
          sudo systemctl is-enabled --quiet ise-exporter
          if sudo systemctl is-active --quiet ise-exporter; then
            echo "fresh install unexpectedly started with placeholder configuration" >&2
            exit 1
          fi
          test "$(sudo systemctl show ise-exporter --property=NRestarts --value)" = 0
          sudo grep -q '^host = "pan1\.example\.com"$' /etc/ise-exporter/config.toml
          test "$(sudo grep -c '^password = "changeme"$' /etc/ise-exporter/config.toml)" = 2

      - name: Show service logs on failure
        if: failure()
        run: sudo journalctl -u ise-exporter --no-pager -n 200

  debian-package-and-unit:
    runs-on: ubuntu-24.04
    container: debian:12
    timeout-minutes: 15
    steps:
      - name: Install Debian build prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-venv ca-certificates git systemd

      - uses: actions/checkout@v4

      - name: Validate Debian package, TOML, and systemd unit
        run: |
          bash -n deploy/install.sh
          python3 -m venv /tmp/ise-exporter-venv
          /tmp/ise-exporter-venv/bin/pip install .
          /tmp/ise-exporter-venv/bin/python -c \
            'from ise_exporter.config import Config; c = Config.load("ise-exporter.toml.example"); assert c.ise_host == "pan1.example.com"'
          systemd-analyze verify deploy/ise-exporter.service
