apiVersion: 1

# Replace Grafana's implicit email route. SMTP is intentionally not configured;
# the local Alertmanager is the deployment's single notification router.
policies:
  - orgId: 1
    receiver: Local Alertmanager
    group_by: [grafana_folder, alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
