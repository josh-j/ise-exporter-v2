services:
  ise-exporter:
    build:
      context: ..                 # repo root (so the build sees pyproject.toml + ise_exporter/)
      dockerfile: deploy/Dockerfile
    image: ise-exporter:2.0.0
    container_name: ise-exporter
    environment:
      ISE_EXPORTER_CONFIG: /etc/ise-exporter/config.toml
    ports:
      - "9618:9618"
    volumes:
      - ./certs:/etc/ise-exporter/certs:ro
      - ../ise-exporter.toml:/etc/ise-exporter/config.toml:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9618/metrics', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
